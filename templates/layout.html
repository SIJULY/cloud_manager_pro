<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cloud Management Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='ui_theme.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="cm-app-shell">
        <nav class="navbar navbar-expand-lg cm-topbar">
            <div class="container-fluid px-3 px-lg-4 py-2">
                <a class="navbar-brand" href="/">
                    <span class="cm-brand-mark">
                        <i class="bi bi-clouds-fill"></i>
                    </span>
                    <span class="cm-brand-copy">
                        <span class="cm-brand-title">Cloud Manager</span>
                        <span class="cm-brand-subtitle">Fusion Control Center</span>
                    </span>
                </a>

                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item">
                            <a class="nav-link {% if request.path.startswith('/oci') %}active{% endif %}" href="{{ url_for('oci.oci_index') }}">
                                <i class="bi bi-hdd-network me-2"></i>OCI Panel
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path.startswith('/azure') %}active{% endif %}" href="{{ url_for('azure.azure_index') }}">
                                <i class="bi bi-microsoft me-2"></i>Azure Panel
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path.startswith('/aws') %}active{% endif %}" href="{{ url_for('aws.aws_index') }}">
                                <i class="bi bi-amazon me-2"></i>AWS Panel
                            </a>
                        </li>
                    </ul>

                    <div class="cm-toolbar ms-lg-3">
                        {% if session.get('login_ip') %}
                        <span onclick="confirmAddWhitelist('{{ session.get('login_ip') }}')" class="cm-ip-chip" title="点击将此 IP 加入安全白名单">
                            <i class="bi bi-shield-check"></i>
                            <span>IP: {{ session.get('login_ip') }}</span>
                        </span>
                        {% endif %}

                        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm cm-logout-btn">
                            <i class="bi bi-box-arrow-right me-1"></i>登出
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="cm-page-wrap">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function confirmAddWhitelist(currentIp) {
            if (confirm(`【安全配置】\n您是否要将当前登录 IP (${currentIp}) 设置为永久白名单？\n\n设置后，从该 IP 登录将不受任何风控限制。`)) {
                fetch('/api/add-whitelist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip: currentIp })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.msg);
                    } else {
                        alert("❌ 添加失败：" + data.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("网络错误，无法添加到白名单。");
                });
            }
        }
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
